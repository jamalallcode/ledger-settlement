    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tableSticky.css">
    <style>
      body {
        -webkit-font-smoothing: antialiased;
        scroll-behavior: smooth;
        background-color: #ffffff;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* Global Custom Scrollbar Styles */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
        transition: all 0.3s ease;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* For Firefox */
      * {
        scrollbar-width: thin;
        scrollbar-color: #cbd5e1 transparent;
      }

      /* Premium Highlight Animation for Date Picker */
      @keyframes premium-pulse-highlight {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
        50% { transform: scale(1.15); box-shadow: 0 0 15px 5px rgba(37, 99, 235, 0.2); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
      }

      .animate-premium-pulse {
        animation: premium-pulse-highlight 2s infinite ease-in-out;
      }

      /* Notification Scale Animation (Small to Large) */
      @keyframes notif-scale-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.3); }
      }

      .animate-notif-scale {
        animation: notif-scale-pulse 1.5s infinite ease-in-out;
      }

      /* পেজ ট্রানজিশন এনিমেশন - ল্যান্ডিং/হোম পেজের জন্য (Premium Reveal) */
      @keyframes landing-dashboard-entrance {
        0% {
          opacity: 0;
          transform: translateY(50px) scale(0.95);
          filter: blur(15px) brightness(1.2);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0) brightness(1);
        }
      }

      /* পেজ ট্রানজিশন এনিমেশন - রেজিস্টার পেজের জন্য */
      @keyframes premium-entrance {
        0% {
          opacity: 0;
          transform: translateY(30px) scale(0.99);
          filter: blur(4px);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      /* পেজ ট্রানজিশন এনিমেশন - রিটার্ণ পেজের মেইন কন্টেইনার */
      @keyframes report-reveal {
        0% {
          opacity: 0;
          transform: translateX(40px);
          filter: blur(10px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
          filter: blur(0);
        }
      }

      /* টেবিল স্পেসিফিক এনিমেশন - মাসিক রিটার্ণ টেবিলের জন্য */
      @keyframes table-pop-in {
        0% {
          opacity: 0;
          transform: translateY(40px) scale(0.98);
          filter: brightness(1.5) blur(8px);
        }
        60% {
          opacity: 0.8;
          transform: translateY(-5px) scale(1.01);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: brightness(1) blur(0);
        }
      }

      .animate-landing-premium {
        animation: landing-dashboard-entrance 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .animate-premium-page {
        animation: premium-entrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .animate-report-page {
        animation: report-reveal 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
      }

      .animate-table-entrance {
        animation: table-pop-in 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      /* টেবিল কন্টেইনার */
      .table-container {
        position: relative;
        width: 100%;
        max-width: 100%;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      /* Force table to fit at 100% zoom on desktop/laptop */
      @media (min-width: 1280px) {
        .table-container {
          overflow-x: hidden !important;
        }
        .table-container table {
          table-layout: fixed !important;
          width: 100% !important;
        }
      }

      table {
        border-collapse: separate !important;
        border-spacing: 0 !important;
        width: 100%;
        table-layout: fixed;
      }

      .resizer { position: absolute; right: 0; top: 0; height: 100%; width: 6px; cursor: col-resize; z-index: 120; }
      .resizer:hover, .resizer.resizing { background: #3b82f6 !important; }

      @media print {
        .no-print { display: none !important; }
        .table-container { overflow: visible !important; }
      }
    </style>
    <script type="application/javascript">
      window.process = { env: { API_KEY: '' } };
    </script>
  </head>
  <body class="bg-white overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
</body>
